name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtwebsockets'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            lcov \
            libssl-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DENABLE_WARNINGS=ON \
            -DENABLE_LTO=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Build with coverage
        run: |
          cmake -S . -B build-coverage \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=ON
          cmake --build build-coverage -j$(nproc)

      - name: Generate coverage report
        run: |
          cd build-coverage
          ctest
          lcov --directory . --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*build-coverage/*' '*test*' --output-file coverage.info.cleaned
          genhtml -o coverage_report coverage.info.cleaned

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          target: 'desktop'
          arch: 'win64_msvc2022_64'  # ✅ 与 GitHub windows-latest runner 的 VS2022 (vc143) 工具链匹配
          modules: 'qtwebsockets'

      - name: Configure
        run: |
          cmake -S . -B build \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DENABLE_WARNINGS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: |
          cd build
          ctest -C Release --output-on-failure

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtwebsockets'

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DENABLE_WARNINGS=ON \
            -DENABLE_LTO=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

  format-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14

      - name: Check formatting
        run: |
          find . \( -name "*.cpp" -o -name "*.h" \) -not -path "./build/*" -not -path "./.git/*" | xargs clang-format-14 --dry-run --Werror
