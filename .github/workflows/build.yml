name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-2019  # ✅ 固定 MSVC2019 环境：windows-2019 预装完整 VS2019 + VC142 Toolset，不依赖 VS2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'      # ✅ 固定 Qt 6.5.3 LTS
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'  # ✅ 固定 MSVC2019 ABI 构建的 Qt，与 windows-2019 工具链完全一致
          modules: 'qtwebsockets'    # ✅ 只保留有效的附加模块（不使用 --autodesktop，避免 aqt metadata 解析失败）

      - name: Configure CMake
        run: |
          # ✅ 纯 MSVC2019 工具链：VS2019 生成器 + x64，与 Qt MSVC2019 ABI 完全匹配
          cmake -B build `
            -G "Visual Studio 16 2019" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTS=ON `
            -DENABLE_WARNINGS=ON

      - name: Build
        run: |
          cmake --build build --config Release --parallel 4

      - name: Run tests
        run: |
          cd build
          ctest -C Release --output-on-failure

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtwebsockets'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential libssl-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DENABLE_WARNINGS=ON \
            -DENABLE_LTO=ON

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

  build-macos:
    name: Build on macOS
    runs-on: macos-13  # ✅ 固定 macOS 13（Intel），避免 macos-latest 升级导致 AppleClang 版本漂移
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtwebsockets'

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DENABLE_WARNINGS=ON \
            -DENABLE_LTO=ON

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure