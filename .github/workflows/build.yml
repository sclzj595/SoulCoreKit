name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-2022  # ✅ 固定 Runner：windows-2022 同时预装 VS2022 + VC143/VC142 Toolset，避免 windows-latest 升级导致工具链漂移
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'      # ✅ 固定 Qt 6.5.3 LTS
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'  # ✅ 固定 MSVC2019 ABI 构建的 Qt，与 VC142 Toolset ABI 一致
          modules: 'qtwebsockets'    # ✅ 只保留有效的附加模块（不使用 --autodesktop，避免 aqt metadata 解析失败）

      - name: Configure CMake
        run: |
          # 工具链对齐：VS2022 Generator + v142 Toolset（MSVC2019） + x64
          # 这样 VS2022 Runner + VC142 Toolset + MSVC2019 ABI Qt 全链路一致
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -T v142 ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel 4

      - name: Run tests
        working-directory: build/tests
        run: |
          .\test_result.exe
          .\test_logger.exe
          .\test_storage.exe
          .\test_event_bus.exe
          .\test_http_request.exe
          .\test_network.exe
          .\test_async.exe
          .\test_auth.exe
          .\test_cache.exe
          .\test_typed_event_bus.exe

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtwebsockets'  # ✅ 只保留有效的附加模块

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel 4

      - name: Run tests
        working-directory: build/tests
        run: |
          ./test_result
          ./test_logger
          ./test_storage
          ./test_event_bus
          ./test_http_request
          ./test_network
          ./test_async
          ./test_auth
          ./test_cache
          ./test_typed_event_bus

  build-macos:
    name: Build on macOS
    runs-on: macos-13  # ✅ 固定 macOS 13（Intel），避免 macos-latest 升级到 14/15 导致 AppleClang 版本漂移
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'mac'  # ✅ 从 'macos' 改为 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtwebsockets'  # ✅ 只保留有效的附加模块

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel 4

      - name: Run tests
        working-directory: build/tests
        run: |
          ./test_result
          ./test_logger
          ./test_storage
          ./test_event_bus
          ./test_http_request
          ./test_network
          ./test_async
          ./test_auth
          ./test_cache
          ./test_typed_event_bus